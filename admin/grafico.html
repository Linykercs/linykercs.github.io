<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard – Flávia Franco</title>
<link rel="stylesheet" href="../style/style.css"/>
<link rel="stylesheet" href="../style/agendamentos.css"/>
</head>
<body>
<!-- Dashboard do painel admin com graficos e contadores -->
<div class="admin-app">
  <aside class="admin-sidebar">
    <div class="admin-sidebar__logo">F|</div>
    <nav class="admin-sidebar__nav">
      <a class="admin-nav-item" href="agendamentos.html" title="Agendamentos">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="3" rx="1"/><rect x="3" y="10.5" width="18" height="3" rx="1"/><rect x="3" y="17" width="18" height="3" rx="1"/></svg>
      </a>
      <a class="admin-nav-item active" href="grafico.html" title="Dashboard">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </a>
      <a class="admin-nav-item" href="faqs.html" title="FAQs do Chatbot">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </a>
      <a class="admin-nav-item" href="../home.html" title="Ver site">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </a>
      <a class="admin-nav-item" href="#" title="Sair" onclick="sair()">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </a>
    </nav>
  </aside>

  <div class="admin-main">
    <header class="admin-header">
      <span class="admin-header__title">Dashboard agendamentos</span>
      <div class="admin-header__right">
        <span class="admin-header__nome" id="nomeAdmin"></span>
        <div class="admin-header__avatar">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </div>
      </div>
    </header>

    <div class="admin-content">
      <!-- Cards de resumo com totais de agendamentos -->
      <div class="dash-cards" id="dashCards">
        <div class="dash-card"><div class="dash-card__num" id="dTotal">—</div><div class="dash-card__label">Total Agendamentos</div></div>
        <div class="dash-card dash-card--yellow"><div class="dash-card__num" id="dPendentes">—</div><div class="dash-card__label">Pendentes</div></div>
        <div class="dash-card dash-card--green"><div class="dash-card__num" id="dConfirmados">—</div><div class="dash-card__label">Confirmados</div></div>
        <div class="dash-card dash-card--blue"><div class="dash-card__num" id="dHoje">—</div><div class="dash-card__label">Agendados Hoje</div></div>
      </div>

      <!-- Layout de duas colunas: grafico + consultas de hoje -->
      <div style="margin-top:20px; display:flex; gap:20px; flex:1; min-height:0;">

        <!-- Grafico de barras -->
        <div class="admin-card" style="flex:2; padding:28px; background:#fff; display:flex; flex-direction:column;">
          <h3 style="font-family:var(--serif,serif);font-size:18px;font-weight:400;margin-bottom:24px;color:#1c1c1c;flex-shrink:0">Agendamentos por mês</h3>
          <div style="flex:1; position:relative; min-height:0;">
            <canvas id="graficoBar"></canvas>
          </div>
        </div>

        <!-- Consultas de hoje -->
        <div class="admin-card" style="flex:1; padding:24px; background:#fff; display:flex; flex-direction:column; min-width:0;">
          <h3 style="font-family:var(--serif,serif);font-size:18px;font-weight:400;margin-bottom:16px;color:#1c1c1c;flex-shrink:0">Consultas de Hoje</h3>
          <div id="consultasHoje" style="flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px;">
            <p style="font-size:13px;color:#9a8571;">Carregando...</p>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const API_URL = "https://clinica-production-3c98.up.railway.app/api";
// Redirecionar para login se nao estiver autenticado
if (!localStorage.getItem("token_admin")) window.location.href = "login.html";
document.getElementById("nomeAdmin").textContent = localStorage.getItem("admin_nome")||"";

// Funcao base de requisicao autenticada
async function apiFetch(path) {
  const token = localStorage.getItem("token_admin");
  const res = await fetch(`${API_URL}${path}`, {headers:{"Authorization":`Bearer ${token}`}});
  const data = await res.json();
  if (!res.ok) throw new Error(data.erro||"Erro");
  return data;
}

// Carregar dados do dashboard e renderizar grafico mensal
async function carregarDashboard() {
  try {
    const d = await apiFetch("/admin/dashboard");
    document.getElementById("dTotal").textContent      = d.total||0;
    document.getElementById("dPendentes").textContent  = d.pendentes||0;
    document.getElementById("dConfirmados").textContent= d.confirmados||0;
    document.getElementById("dHoje").textContent       = d.agendadosHoje||0;

    const meses = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
    const statusKeys   = ["pendente","confirmado","concluido","cancelado"];
    const statusCores  = { pendente:"#e8d98a", confirmado:"#a5c8b0", concluido:"#ab9680", cancelado:"#e8a5a5" };
    const statusRotulo = { pendente:"Pendente", confirmado:"Confirmado", concluido:"Concluído", cancelado:"Cancelado" };
    const counts = {};
    statusKeys.forEach(s => { counts[s] = new Array(12).fill(0); });

    try {
      const agendamentos = await apiFetch("/admin/agendamentos");

      // Grafico mensal por status
      agendamentos.forEach(function(a) {
        const h = a.horario_id||{};
        if (h.data) {
          const mes    = new Date(h.data).getMonth();
          const status = a.status||"pendente";
          if (mes >= 0 && mes < 12 && counts[status]) counts[status][mes]++;
        }
      });

      // Consultas de hoje — comparar só a parte da data (evita fuso horario)
      const agora = new Date();
      const hojeStr = `${agora.getFullYear()}-${String(agora.getMonth()+1).padStart(2,"0")}-${String(agora.getDate()).padStart(2,"0")}`;
      const statusBadge = { pendente:"#e8d98a", confirmado:"#a5c8b0", concluido:"#ab9680", cancelado:"#e8a5a5" };
      const hojeList = agendamentos.filter(a => {
        return ((a.horario_id||{}).data||"").startsWith(hojeStr);
      }).sort((a,b) => (a.horario_id?.hora_inicio||"").localeCompare(b.horario_id?.hora_inicio||""));

      const box = document.getElementById("consultasHoje");
      if (!hojeList.length) {
        box.innerHTML = '<p style="font-size:13px;color:#9a8571;text-align:center;margin-top:20px;">Nenhuma consulta hoje.</p>';
      } else {
        box.innerHTML = hojeList.map(a => {
          const h = a.horario_id||{};
          const cor = statusBadge[a.status]||"#e8e0d8";
          const s = (h.servico_id||{}).nome||"—";
          return `<div style="background:#faf8f6;border-radius:8px;padding:12px 14px;border-left:4px solid ${cor};">
            <div style="font-size:13px;font-weight:600;color:#3a3028;">${a.paciente_nome}</div>
            <div style="font-size:12px;color:#7a6a5e;margin-top:3px;">${h.hora_inicio||""} · ${s}</div>
            <span style="font-size:10px;font-weight:600;letter-spacing:.05em;background:${cor};padding:2px 8px;border-radius:20px;color:#3a3028;display:inline-block;margin-top:5px;">${(a.status||"").toUpperCase()}</span>
          </div>`;
        }).join("");
      }
    } catch(e) {}

    new Chart(document.getElementById("graficoBar"), {
      type: "bar",
      data: {
        labels: meses,
        datasets: statusKeys.map(s => ({
          label: statusRotulo[s],
          data: counts[s],
          backgroundColor: statusCores[s],
          borderRadius: 4, borderSkipped: false,
        }))
      },
      options: {
        maintainAspectRatio: false,
        plugins: { legend: { display:true, position:"top", labels:{ boxWidth:12, font:{ size:12 } } } },
        scales: {
          y: { beginAtZero:true, stacked:true, ticks:{ stepSize:1 }, grid:{ color:"rgba(0,0,0,0.05)" } },
          x: { stacked:true, grid:{ display:false } }
        }
      }
    });
  } catch(err) {
    if(err.message.includes("Token")) sair();
  }
}

// Sair do painel (logout)
function sair() { localStorage.removeItem("token_admin"); localStorage.removeItem("admin_nome"); window.location.href="login.html"; }
carregarDashboard();
</script>
</body>
</html>
